# Dev/test dependencies. The audit trail (ADR-0001 write-behind) needs
# Postgres: `docker compose up -d postgres`, then `just test-db`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15
